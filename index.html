<!DOCTYPE html>
<html lang="ja">
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta charset="UTF-8">
  <title>着せ替え幻想郷</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <h1>着せ替え幻想郷</h1>

  <div class="controls">
    <label>カテゴリ
<div id="categoryTabs" class="category-tabs">
  <button data-cat="face">顔</button>
  <button data-cat="hair">髪</button>
  <button data-cat="sidehair">サイド</button>
  <button data-cat="back">背中</button>
  <button data-cat="inner">インナー</button>
  <button data-cat="tops">トップス</button>
  <button data-cat="bottoms">ボトムス</button>
  <button data-cat="dress">ドレス</button>
  <button data-cat="socks">靴下</button>
  <button data-cat="shoes">靴</button>
  <button data-cat="outer">上着</button>
  <button data-cat="accessories">アクセ</button>
  <button data-cat="headwear">髪飾り</button>
  <button data-cat="occiput">髪飾り2</button>
  <button data-cat="item">アイテム</button>
  <button data-cat="others">その他</button>
  <button data-cat="background">背景</button>
</div>
  </div>

<div class="preset-select-wrapper">
  <button class="preset-toggle-btn" onclick="togglePresetList()">キャラクター選択 ▼</button>
  <div id="presetList" class="preset-list hidden">
    <!-- JSで動的に中身を入れる -->
  </div>
</div>

  <div id="thumbnails" class="thumbnails"></div>

<div id="canvas" class="canvas">

  <!-- 背景レイヤー（いちばん下） -->
  <img id="backgroundLayer" class="layer background hidden" />

  <!-- 素体 -->
  <img src="assets/base.png" class="layer base" />

</div>

<label>
  背景色相
  <input
    type="range"
    min="0"
    max="360"
    value="0"
    oninput="setBackgroundHue(this.value)"
  >
</label>

<button onclick="saveCanvasImage()">画像を保存する</button>

  <script src="script.js"></script>
</body>
</html>
