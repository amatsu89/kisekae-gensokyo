<!DOCTYPE html>
<html lang="ja">
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta charset="UTF-8">
  <title>着せ替え幻想郷</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic&display=swap" rel="stylesheet">
</head>

<body>

<h1>着せ替え幻想郷</h1>

<div class="main-layout">

  <!-- 左：キャラ -->
  <div class="left-area">

    <div id="canvas">

      <!-- 背景 -->
      <img id="backgroundLayer" class="layer background hidden">

      <!-- 素体 -->
      <img src="assets/base.png" class="layer base">

    </div>

  </div>

  <!-- 中央：UI -->
  <div class="center-area">

    <div class="category-title">カテゴリ</div>

    <div id="categoryTabs" class="category-tabs">

      <button data-cat="face">顔</button>
      <button data-cat="hair">髪</button>
      <button data-cat="sidehair">サイド</button>
      <button data-cat="back">背中</button>
      <button data-cat="inner">インナー</button>
      <button data-cat="tops">トップス</button>
      <button data-cat="bottoms">ボトムス</button>
      <button data-cat="dress">ドレス</button>
      <button data-cat="socks">靴下</button>
      <button data-cat="shoes">靴</button>
      <button data-cat="outer">上着</button>
      <button data-cat="accessories">アクセ</button>
      <button data-cat="headwear">髪飾り</button>
      <button data-cat="occiput">髪飾り2</button>
      <button data-cat="item">アイテム</button>
      <button data-cat="others">その他</button>
      <button data-cat="background">背景</button>

    </div>

    <div id="thumbnails" class="thumbnails"></div>

  </div>

<div class="character-area">
  <div class="preset-select-wrapper">
      <button class="preset-toggle-btn" onclick="togglePresetList()">
        キャラクター選択 ▼
    </button>
    <div id="presetList" class="preset-list hidden"></div>
  </div>
</div>

</div>



<div class="bottom-ui">

<label>
背景色相
<input
type="range"
min="0"
max="360"
value="0"
oninput="setBackgroundHue(this.value)">
</label>

<button onclick="saveCanvasImage()">
画像保存
</button>

<button id="randomBtn">ランダム</button>

<button id="ruleBtn">規約</button>

</div>

<!-- 規約モーダル -->
<div id="ruleModal" class="modal hidden">
  <div class="modal-content">

    <h2>利用規約</h2>

    <p>
      本サイトで作成した画像について<br>
      ・加工・改変〇<br>
      ・商用利用〇<br>
      ・インターネット上への投稿〇<br>
      <br>
以下の行為はおやめください<br>
      ・上海アリス幻樂団様の規約に反する利用<br>
      ・本サイト上の画像素材の二次配布
    </p>

    <button id="closeRule">閉じる</button>

  </div>
</div>

<script src="script.js"></script>

</body>
</html>
